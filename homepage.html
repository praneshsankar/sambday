<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Homepage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="homepage-body">
  <div class="page page--homepage">
    <main class="homepage">
      <header class="homepage__header">
        <h1 class="homepage__title">Welcome back</h1>
        <p class="homepage__subtitle">You're logged in.</p>
      </header>

      <section class="posters" aria-label="Posters">
        <div class="posters__frame">
          <img class="posters__image posters__image--active" src="assets/posters/poster-1.png" alt="">
          <img class="posters__image" src="assets/posters/poster-2.png" alt="">
          <img class="posters__image" src="assets/posters/poster-3.png" alt="">
          <img class="posters__image" src="assets/posters/poster-4.png" alt="">
          <img class="posters__image" src="assets/posters/poster-5.png" alt="">
        </div>
      </section>

      <!-- NEW: Intro Text Section -->
      <div class="intro-text">
        <p>To the girl who is so many things...</p>
      </div>

      <div class="gallery">
        <div id="gallerySections" class="gallery-sections"></div>
      </div>

      <section class="birthday" aria-label="Birthday Wishes">
        <div class="birthday__poppers">
          <span class="birthday__emoji birthday__emoji--left">🎉</span>
          <h2 class="birthday__text">HAPPY BIRTHDAY SAM</h2>
          <span class="birthday__emoji birthday__emoji--right">🎉</span>
        </div>
        <div class="birthday__cake">
          <span class="birthday__emoji birthday__emoji--cake">🎂</span>
        </div>
      </section>

      <footer class="homepage__footer">
        <a class="homepage__link" href="index.html">Switch profile</a>
      </footer>
    </main>
  </div>

  <script src="gallery-data.js"></script>
  <script src="posters.js"></script>
  <script src="hot-ridhi.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    const birthdaySection = document.querySelector('.birthday');
    
    // Trigger confetti when the birthday section scrolls into view
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          
          const duration = 3000;
          const end = Date.now() + duration;

          // Fire confetti from both sides of the screen
          (function frame() {
            confetti({
              particleCount: 5,
              angle: 60,
              spread: 55,
              origin: { x: 0 },
              colors: ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#ffffff']
            });
            confetti({
              particleCount: 5,
              angle: 120,
              spread: 55,
              origin: { x: 1 },
              colors: ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#ffffff']
            });

            if (Date.now() < end) {
              requestAnimationFrame(frame);
            }
          }());
          
          // Stop observing so it only fires once per visit
          observer.unobserve(birthdaySection);
        }
      });
    }, { threshold: 0.5 }); // Triggers when 50% of the section is visible

    observer.observe(birthdaySection);
  </script>

</body>
</html>
